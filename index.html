<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLA Logistics Pro — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: rgba(240,246,252,0.1);
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --danger: #f85149;
    --warn: #d29922;
    --purple: #bc8cff;
    --radius: 12px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 20px;
    line-height: 1.5;
  }
  .container { max-width: 1200px; margin: 0 auto; }
  
  /* Header */
  .page-header { margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
  .page-title { font-size: 24px; font-weight: 600; }
  .page-title span { color: var(--accent); }

  /* Source Cards */
  .sources { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-bottom: 25px; }
  .card-src { 
    background: var(--surface); border: 1px solid var(--border); padding: 20px; border-radius: var(--radius);
    cursor: pointer; transition: 0.2s; position: relative;
  }
  .card-src:hover { border-color: var(--accent); background: var(--surface2); }
  .card-src.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .card-src i { font-size: 24px; margin-bottom: 10px; color: var(--accent); }
  .card-src h4 { font-size: 14px; text-transform: uppercase; margin-bottom: 5px; }
  .card-src p { font-size: 12px; color: var(--text-dim); }

  /* Info Bar */
  .info-bar { 
    padding: 12px 20px; border-radius: 8px; margin-bottom: 25px; font-size: 13px;
    display: flex; align-items: center; gap: 10px; font-family: 'DM Mono', monospace;
  }
  .info-bar.loading { background: rgba(88,166,255,0.1); color: var(--accent); border: 1px solid var(--accent); }
  .info-bar.success { background: rgba(63,185,80,0.1); color: var(--accent2); border: 1px solid var(--accent2); }
  .info-bar.error { background: rgba(248,81,73,0.1); color: var(--danger); border: 1px solid var(--danger); }

  /* Metrics */
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
  .m-card { background: var(--surface); padding: 20px; border-radius: var(--radius); border: 1px solid var(--border); }
  .m-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .m-value { font-size: 24px; font-family: 'DM Mono', monospace; font-weight: 600; }

  /* Tabs */
  .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
  .tab-btn { 
    padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border); 
    background: var(--surface); color: var(--text-dim); cursor: pointer; font-size: 12px;
  }
  .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

  /* Charts */
  .chart-container { background: var(--surface); padding: 25px; border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 20px; }
  .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .chart-title { font-size: 12px; color: var(--text-dim); text-transform: uppercase; font-weight: 600; }
  .legend { display: flex; gap: 15px; font-family: 'DM Mono', monospace; font-size: 11px; }
  .leg-item { display: flex; align-items: center; gap: 5px; }
  .dot { width: 8px; height: 8px; border-radius: 2px; }

  /* Table */
  .table-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; text-align: left; }
  th { background: var(--surface2); padding: 12px 15px; color: var(--text-dim); text-transform: uppercase; font-size: 10px; }
  td { padding: 10px 15px; border-bottom: 1px solid var(--border); font-family: 'DM Mono', monospace; }
  .badge { padding: 2px 6px; border-radius: 4px; font-size: 10px; }
  .badge-green { background: rgba(63,185,80,0.2); color: #7ee787; }
  .badge-red { background: rgba(248,81,73,0.2); color: #ffa198; }

  #csv-file { display: none; }
</style>
</head>
<body>

<div class="container">
  <header class="page-header">
    <h1 class="page-title">Dashboard <span>SLA Pengiriman</span></h1>
  </header>

  <div class="sources">
    <div class="card-src active" onclick="loadLocalData(this)">
      <i class="fas fa-database"></i>
      <h4>Data Lokal</h4>
      <p>Gunakan contoh data bawaan</p>
    </div>
    <div class="card-src" onclick="fetchSheets(this)">
      <i class="fas fa-file-csv"></i>
      <h4>Google Sheets</h4>
      <p>Sinkronisasi Spreadsheet live</p>
    </div>
    <div class="card-src" onclick="document.getElementById('csv-file').click()">
      <i class="fas fa-cloud-upload-alt"></i>
      <h4>Upload CSV</h4>
      <p>Import file dari komputer</p>
    </div>
  </div>

  <input type="file" id="csv-file" accept=".csv" onchange="handleUpload(event)">

  <div id="infoBar" class="info-bar success">
    <i class="fas fa-check-circle"></i>
    <span id="infoText">Sistem siap. Menampilkan data lokal.</span>
  </div>

  <div class="metrics" id="metricsArea"></div>

  <div class="tabs">
    <button class="tab-btn active" onclick="changeView('semua', this)">SEMUA</button>
    <button class="tab-btn" onclick="changeView('INFORMA', this)">INFORMA</button>
    <button class="tab-btn" onclick="changeView('ELEKTRONIK', this)">ELEKTRONIK</button>
    <button class="tab-btn" onclick="changeView('SELMA', this)">SELMA</button>
  </div>

  <div class="chart-container">
    <div class="chart-header">
      <div class="chart-title">Tren SLA GRW (%)</div>
      <div class="legend" id="grwLegend"></div>
    </div>
    <div style="height:300px"><canvas id="grwChart"></canvas></div>
  </div>

  <div class="chart-container">
    <div class="chart-header">
      <div class="chart-title">Tren SLA Customer (%)</div>
      <div class="legend" id="custLegend"></div>
    </div>
    <div style="height:300px"><canvas id="custChart"></canvas></div>
  </div>

  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>Tanggal</th>
          <th>GRW Informa</th>
          <th>GRW Elek</th>
          <th>GRW Selma</th>
          <th>CUST Informa</th>
          <th>CUST Elek</th>
          <th>CUST Selma</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<script>
// --- KONFIGURASI ---
const SHEETS_CSV_URL = 'https://docs.google.com/spreadsheets/d/1DAOcHYS2n8jja_AbYW9A2_ncfmefbMEWZ_OkANtkkT8/export?format=csv&gid=0';

let currentData = [];
let charts = {};

// --- MAPPING WARNA ---
const COLORS = {
  informa: '#58a6ff',
  elektronik: '#bc8cff',
  selma: '#d29922',
  cust_informa: '#3fb950',
  cust_elek: '#f85149',
  cust_selma: '#7ee787'
};

// --- DATA AWAL (LOCAL) ---
const LOCAL_DATA = [
  {tgl:'01/04', gi_g:99.5, ge_g:100, s_g:100, gi_c:100, ge_c:100, s_c:100},
  {tgl:'02/04', gi_g:98.2, ge_g:100, s_g:99.5, gi_c:99.1, ge_c:100, s_c:100},
  {tgl:'03/04', gi_g:100, ge_g:98.5, s_g:100, gi_c:100, ge_c:100, s_c:99.2}
];

// --- FUNGSI PARSING DATA (Kunci Perbaikan Angka) ---
function parseSLA(val) {
  if(!val) return 100;
  // Ganti koma ke titik (format Indo) dan hapus simbol %
  let clean = val.toString().replace(/,/g, '.').replace(/%/g, '').trim();
  let num = parseFloat(clean);
  if(isNaN(num)) return 100;
  return num > 100 ? 100 : num; // Cap maksimal 100%
}

// --- FUNGSI AMBIL GOOGLE SHEETS ---
async function fetchSheets(el) {
  updateInfo("Menghubungkan ke Google Sheets...", "loading");
  setActiveCard(el);
  
  try {
    const res = await fetch(SHEETS_CSV_URL);
    const text = await res.text();
    processCSV(text);
    updateInfo("Data Google Sheets berhasil dimuat", "success");
  } catch (e) {
    updateInfo("Gagal mengambil data. Pastikan link Sheets publik.", "error");
  }
}

function processCSV(csvText) {
  const lines = csvText.split('\n').filter(l => l.trim() !== '');
  const headers = lines[0].toLowerCase().split(',');

  // Cari index kolom secara fleksibel
  const idx = {
    tgl: headers.findIndex(h => h.includes('tgl') || h.includes('tanggal')),
    gi_g: headers.findIndex(h => h.includes('grw') && h.includes('informa')),
    ge_g: headers.findIndex(h => h.includes('grw') && (h.includes('elek') || h.includes('info.elek'))),
    s_g: headers.findIndex(h => h.includes('grw') && h.includes('selma')),
    gi_c: headers.findIndex(h => h.includes('cust') && h.includes('informa')),
    ge_c: headers.findIndex(h => h.includes('cust') && (h.includes('elek') || h.includes('info.elek'))),
    s_c: headers.findIndex(h => h.includes('cust') && h.includes('selma'))
  };

  const results = [];
  for(let i=1; i<lines.length; i++) {
    const col = lines[i].split(',');
    if(col.length < 2) continue;

    results.push({
      tgl: col[idx.tgl] || `Data-${i}`,
      gi_g: parseSLA(col[idx.gi_g]),
      ge_g: parseSLA(col[idx.ge_g]),
      s_g: parseSLA(col[idx.s_g]),
      gi_c: parseSLA(col[idx.gi_c]),
      ge_c: parseSLA(col[idx.ge_c]),
      s_c: parseSLA(col[idx.s_c])
    });
  }
  
  // URUTKAN DATA BERDASARKAN TANGGAL (Penting agar grafik tidak acak)
  currentData = results;
  renderAll();
}

// --- FUNGSI GRAFIK ---
function initChart(id, title, datasets) {
  if(charts[id]) charts[id].destroy();
  
  const ctx = document.getElementById(id).getContext('2d');
  charts[id] = new Chart(ctx, {
    type: 'line',
    data: { 
      labels: currentData.map(d => d.tgl),
      datasets: datasets 
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { display: false } },
      scales: {
        y: {
          min: 90, // Tampilan fokus di 90% - 100%
          max: 100.5,
          ticks: { color: '#8b949e', font: { family: 'DM Mono', size: 10 }, callback: v => v + '%' },
          grid: { color: 'rgba(240,246,252,0.05)' }
        },
        x: {
          ticks: { color: '#8b949e', font: { family: 'DM Mono', size: 10 } },
          grid: { display: false }
        }
      }
    }
  });
}

function updateInfo(msg, type) {
  const bar = document.getElementById('infoBar');
  bar.className = `info-bar ${type}`;
  document.getElementById('infoText').innerText = msg;
}

function renderAll() {
  updateMetrics();
  renderTable();
  changeView('semua');
}

function updateMetrics() {
  const avg = (arr) => (arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(2);
  const grwAvg = avg(currentData.map(d => (d.gi_g + d.ge_g + d.s_g)/3));
  const custAvg = avg(currentData.map(d => (d.gi_c + d.ge_c + d.s_c)/3));

  document.getElementById('metricsArea').innerHTML = `
    <div class="m-card"><div class="m-label">Avg SLA GRW</div><div class="m-value">${grwAvg}%</div></div>
    <div class="m-card"><div class="m-label">Avg SLA Customer</div><div class="m-value" style="color:var(--accent2)">${custAvg}%</div></div>
    <div class="m-card"><div class="m-label">Total Record</div><div class="m-value">${currentData.length}</div></div>
  `;
}

function changeView(type, btn) {
  if(btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  const grwSets = [];
  const custSets = [];

  const addSet = (target, label, key, color) => {
    target.push({
      label: label,
      data: currentData.map(d => d[key]),
      borderColor: color,
      backgroundColor: color + '22',
      fill: true,
      tension: 0.3,
      borderWidth: 2,
      pointRadius: 2
    });
  };

  if(type === 'semua' || type === 'INFORMA') {
    addSet(grwSets, 'Informa', 'gi_g', COLORS.informa);
    addSet(custSets, 'Informa', 'gi_c', COLORS.cust_informa);
  }
  if(type === 'semua' || type === 'ELEKTRONIK') {
    addSet(grwSets, 'Elektronik', 'ge_g', COLORS.elektronik);
    addSet(custSets, 'Elektronik', 'ge_c', COLORS.cust_elek);
  }
  if(type === 'semua' || type === 'SELMA') {
    addSet(grwSets, 'Selma', 's_g', COLORS.selma);
    addSet(custSets, 'Selma', 's_c', COLORS.cust_selma);
  }

  initChart('grwChart', 'GRW', grwSets);
  initChart('custChart', 'CUST', custSets);
  
  // Legend
  const buildLeg = (sets) => sets.map(s => `<div class="leg-item"><div class="dot" style="background:${s.borderColor}"></div>${s.label}</div>`).join('');
  document.getElementById('grwLegend').innerHTML = buildLeg(grwSets);
  document.getElementById('custLegend').innerHTML = buildLeg(custSets);
}

function renderTable() {
  const b = (v) => `<span class="badge ${v >= 99 ? 'badge-green' : 'badge-red'}">${v.toFixed(2)}%</span>`;
  document.getElementById('tableBody').innerHTML = currentData.map(d => `
    <tr>
      <td>${d.tgl}</td>
      <td>${b(d.gi_g)}</td><td>${b(d.ge_g)}</td><td>${b(d.s_g)}</td>
      <td>${b(d.gi_c)}</td><td>${b(d.ge_c)}</td><td>${b(d.s_c)}</td>
    </tr>
  `).join('');
}

function loadLocalData(el) {
  setActiveCard(el);
  currentData = JSON.parse(JSON.stringify(LOCAL_DATA));
  renderAll();
  updateInfo("Menampilkan data simulasi lokal.", "success");
}

function setActiveCard(el) {
  document.querySelectorAll('.card-src').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
}

function handleUpload(e) {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => processCSV(ev.target.result);
  reader.readAsText(file);
  updateInfo(`File ${file.name} berhasil diimport`, "success");
}

// Start
loadLocalData(document.querySelector('.card-src'));
</script>

</body>
</html>
